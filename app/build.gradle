plugins {
    id 'com.android.application' version '8.1.0' apply true
}

android {
    namespace "com.meritz.notlistener"
    compileSdk 34

    defaultConfig {
        applicationId "com.meritz.notlistener"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
